<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>RetroVision Video | Catalog</title>
    <link href="https://fonts.googleapis.com/css2?family=Yellowtail&display=swap" rel="stylesheet">
    <style>
        body { 
            background-color: #FAFAFA;
            background-image: 
                linear-gradient(rgba(255, 0, 255, 0.07) 1px, transparent 1px),
                linear-gradient(90deg, rgba(0, 255, 255, 0.07) 1px, transparent 1px);
            background-size: 30px 30px;
            color: #1A1A1A; 
            font-family: 'Helvetica Neue', Helvetica, Arial, sans-serif; 
            margin: 0; 
            padding: 15px; 
            min-height: 100vh;
            position: relative;
        }

        /* Subtle Admin Link Floating at Top */
        .admin-link {
            position: absolute;
            top: 15px;
            right: 15px;
            color: #001A5E;
            background: #FFCC00;
            border: 2px solid #1A1A1A;
            padding: 6px 12px;
            font-family: 'Arial Black', sans-serif;
            font-size: 0.8em;
            font-weight: bold;
            text-decoration: none;
            box-shadow: 3px 3px 0px #FF00FF;
            cursor: pointer;
            z-index: 10;
            text-transform: uppercase;
            letter-spacing: 1px;
            transition: all 0.1s;
        }
        .admin-link:hover {
            background: #00FFFF;
            box-shadow: 3px 3px 0px #FF00FF;
        }
        .admin-link:active {
            transform: translate(2px, 2px);
            box-shadow: 1px 1px 0px #FF00FF;
        }

        /* ---Vaporwave Sign --- */
        .header-sign {
            position: relative;
            margin: 30px auto 30px auto;
            max-width: 750px;
            padding: 30px 15px;
            text-align: center;
            background: #001A5E; 
            border: 6px solid #FFCC00; 
            box-shadow: 8px 8px 0px #FF00FF, 16px 16px 0px #00FFFF;
        }

        .logo-script { 
            font-family: 'Yellowtail', cursive; 
            font-size: 4em; 
            color: #FFCC00; 
            display: inline-block; 
            transform: rotate(-4deg);
            margin-right: 10px;
            line-height: 0.8;
            position: relative;
            z-index: 2;
            text-shadow: 3px 3px 0 #FF00FF;
        }

        .logo-video { 
            font-family: 'Arial Black', Impact, sans-serif; 
            font-size: 1.8em; 
            color: #FFFFFF; 
            font-weight: 900;
            text-transform: uppercase;
            letter-spacing: 4px;
            display: inline-block;
            transform: rotate(-4deg) translateY(8px);
            position: relative;
            z-index: 3;
            text-shadow: 2px 2px 0 #00FFFF;
        }

        /* --- UI Elements --- */
        marquee { 
            background-color: #001A5E; 
            color: #FFCC00; 
            padding: 10px; 
            font-size: 1em; 
            border-top: 3px solid #FF00FF; 
            border-bottom: 3px solid #00FFFF; 
            margin: 20px 0; 
            font-weight: 900;
            text-transform: uppercase;
            letter-spacing: 2px;
            box-shadow: 0 4px 10px rgba(0,0,0,0.1);
        }

        .search-container {
            text-align: center;
            margin-bottom: 20px;
        }

        #search-input {
            width: 100%;
            max-width: 600px;
            padding: 12px 15px;
            background: #FFFFFF;
            border: 4px solid #1A1A1A;
            color: #1A1A1A;
            font-family: 'Arial Black', sans-serif;
            font-size: 1.1em;
            text-transform: uppercase;
            outline: none;
            transition: all 0.2s ease;
            box-shadow: 4px 4px 0px #00FFFF;
            box-sizing: border-box;
        }

        #search-input:focus {
            border-color: #FF00FF;
            box-shadow: 4px 4px 0px #FF00FF;
        }

        /* Responsive Container */
        .container { 
            display: flex; 
            flex-direction: column; 
            max-width: 1200px; 
            margin: 0 auto; 
            gap: 20px; 
        }

        @media (min-width: 768px) {
            .container { flex-direction: row; }
            .catalog { flex: 1.2; height: 650px; }
            .details { flex: 0.8; height: 650px; position: sticky; top: 20px; overflow-y: auto; }
        }
        
        .catalog { 
            background: #FFFFFF; 
            border: 4px solid #1A1A1A; 
            height: 400px; 
            overflow-y: auto; 
            box-shadow: 6px 6px 0px #FF00FF;
            position: relative;
        }
        
        .details { 
            background: #FFFFFF; 
            border: 4px solid #1A1A1A; 
            padding: 20px; 
            display: flex; 
            flex-direction: column; 
            align-items: center; 
            text-align: center; 
            box-shadow: 6px 6px 0px #FFCC00;
            box-sizing: border-box;
        }
        
        table { width: 100%; border-collapse: collapse; }
        th, td { padding: 12px 10px; text-align: left; border-bottom: 2px solid #EEE; }
        th { 
            background-color: #001A5E; 
            color: #FFFFFF; 
            font-weight: 900; 
            position: sticky; 
            top: 0; 
            letter-spacing: 1px; 
            text-transform: uppercase;
            z-index: 5;
        }
        
        .media-row { cursor: pointer; transition: background-color 0.1s; font-weight: bold; }
        .media-row:nth-child(even) { background-color: #F9F9F9; }
        .media-row:hover { background-color: #00FFFF; color: #1A1A1A; }
        .media-row.active { background-color: #FF00FF; color: #FFFFFF; }
        
        .format-badge { 
            border: 2px solid #1A1A1A; 
            padding: 3px 6px; 
            font-size: 0.75em; 
            font-weight: 900;
            color: #1A1A1A; 
            background: #FFCC00; 
            text-transform: uppercase;
            white-space: nowrap;
        }

        /* --- Stock Status Indicators --- */
        .status-dot {
            display: inline-block;
            width: 12px;
            height: 12px;
            border-radius: 50%;
            margin-right: 10px;
            border: 2px solid #1A1A1A;
            vertical-align: middle;
        }
        
        /* Vibrant neon vaporwave status indicators */
        .status-instock { background-color: #00FF00; box-shadow: 0 0 8px #00FF00; }
        .status-checkedout { background-color: #FFCC00; box-shadow: 0 0 8px #FFCC00; } /* yellow dropdown */
        .status-damaged { background-color: #FF00FF; box-shadow: 0 0 8px #FF00FF; } /* orange/pink dropdown */
        .status-onorder { background-color: #FF0044; box-shadow: 0 0 8px #FF0044; } /* dark red dropdown */
        .status-unavailable { background-color: #888888; box-shadow: 0 0 4px #888888; }
        .status-request { background-color: #00FFFF; box-shadow: 0 0 8px #00FFFF; }

        #detail-status {
            font-family: 'Arial Black', sans-serif;
            font-size: 1.1em;
            margin-bottom: 15px;
            padding: 8px 15px;
            border: 3px solid #1A1A1A;
            width: 100%;
            box-sizing: border-box;
            text-transform: uppercase;
        }

        .text-instock { background-color: #00FF00; color: #1A1A1A; }
        .text-checkedout { background-color: #FFCC00; color: #1A1A1A; }
        .text-damaged { background-color: #FF00FF; color: #FFFFFF; }
        .text-onorder { background-color: #FF0044; color: #FFFFFF; }
        .text-unavailable { background-color: #888888; color: #FFFFFF; }
        .text-request { background-color: #00FFFF; color: #1A1A1A; }
        
        #detail-cover { 
            width: 180px; 
            height: 270px; 
            min-height: 270px; /* CRITICAL FIX: Prevent vertical squeezing inside flexbox container */
            flex-shrink: 0; /* CRITICAL FIX: Stop container from squeezing the poster height */
            background-color: #EEE; 
            border: 4px solid #1A1A1A; 
            margin-bottom: 15px; 
            display: flex; 
            align-items: center; 
            justify-content: center; 
            color: #999; 
            font-weight: 900; 
            font-size: 1.1em; 
            box-shadow: 4px 4px 0px #00FFFF;
            overflow: hidden; 
            position: relative;
        }
        #detail-cover img { width: 100%; height: 100%; object-fit: cover; }

        .apology-cover {

            height:
